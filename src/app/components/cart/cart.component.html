<div class="cart-container mx-auto p-4 max-w-3xl">
  <nav class="navbar flex justify-between items-center mb-4 bg-gray-200 p-3 rounded">
    <h1 class="navbar-title text-2xl font-bold">Carrito de Compras</h1>
    <div class="flex items-center space-x-2">
      <button class="back-store-btn p-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition duration-200" (click)="goToStore()">
        <i class="bi bi-shop fs-4"></i> <!-- Icono de volver a la tienda -->
      </button>
      <button class="logout-btn p-2 bg-red-500 text-white rounded hover:bg-red-600 transition duration-200" (click)="logout()">
        <i class="bi bi-box-arrow-right fs-4"></i> <!-- Icono de logout -->
      </button>
    </div>
  </nav>

  <div class="cart border border-gray-300 rounded-lg p-4">
    <div *ngIf="cartProducts.length === 0" class="empty-cart text-center py-10">
      <p class="text-lg text-gray-500">El carrito está vacío</p>
    </div>

    <div *ngIf="cartProducts.length > 0">
      <div *ngFor="let product of cartProducts" class="cart-item flex items-center border-b border-gray-200 py-4">
        <img [src]="product.image" alt="{{ product.name }}" class="cart-image w-24 h-24 object-cover mr-4 rounded" />
        <div class="cart-info flex-1">
          <h2 class="text-lg font-semibold">{{ product.name }}</h2>
          <p class="text-gray-700">{{ product.price.toFixed(2) }}€</p>
        </div>
      </div>
      <div class="mt-4 flex justify-between">
        <button (click)="buy()" class="buy-btn px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition duration-200">Comprar</button>
        <button (click)="clearCart()" class="clear-cart-btn px-4 py-2 bg-gray-300 text-black rounded hover:bg-gray-400 transition duration-200">Vaciar Carrito</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer mt-4 text-center">
    <p class="text-gray-500">&copy; 2024 ZapasPro. Todos los derechos reservados.</p>
  </footer>
</div>
