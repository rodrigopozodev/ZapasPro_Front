<nav class="navbar">
  <div class="logo">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg2MorgaYLPdKElWQANicIsfX-l1WHZAzpIYZXuOgAP1OFysdB5eRzQbSv41jvZ1i7d10d0zo5vQ_XZVSFkHr09SGe1NYw9n5AROmx6KpXFY5wTbCJF1oR0I_pm3S7Rk46cBehaZTICEcp3SwfK4Qdeq6wknFFs5WCtBO6DAk70wZuaM65oY1Nt9-5rZtZQ/s1600/13v5ux09.png" alt="Logo de la tienda" class="logo-image" />
  </div>
  
  <div class="nav-buttons">
    <button class="cart-btn" (click)="goToCart()" title="Carrito">
      <i class="bi bi-cart fs-4"></i>
    </button>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
      <i class="bi bi-box-arrow-right fs-4"></i>
    </button>
  </div>
</nav>

<div class="store">
  <div class="product-grid">
    <div *ngFor="let product of products" class="product-card">
      <img [src]="product.image" alt="{{ product.name }}" class="product-image" />
      <div class="product-info">
        <h2 class="product-name">{{ product.name }}</h2>
        <p class="product-description">{{ product.description }}</p>
        <p class="product-price">{{ product.price.toFixed(2) }}€</p>
      </div>
      <button class="add-to-cart-btn" (click)="addToCart(product)">Agregar al carrito</button>
    </div>
  </div>
</div>

<footer class="footer">

</footer>
