<div class="flex items-center justify-center min-h-screen bg-gray-100"> <!-- Contenedor que centra el formulario en la pantalla -->
  <div class="container mx-auto max-w-md bg-white p-6 rounded-lg shadow-md"> <!-- Contenedor del formulario -->
    <h1 class="text-2xl font-bold text-center">Bienvenido a ZapasPro</h1> <!-- Título del formulario -->

    <form (ngSubmit)="register()" class="mt-4"> <!-- Formulario con enlace al método de registro -->
      <input [(ngModel)]="username" name="username" placeholder="Nombre de usuario" class="border p-2 w-full mb-2" required /> <!-- Campo de entrada para el nombre de usuario -->
      <input [(ngModel)]="password" name="password" placeholder="Contraseña" type="password" class="border p-2 w-full mb-4" required /> <!-- Campo de entrada para la contraseña -->

      <!-- Select para crear usuarios admin en caso de querer hacer por medio del formulario
      <select [(ngModel)]="role" name="role" class="border p-2 w-full mb-4">
        <option value="client">Cliente</option> 
        <option value="admin">Administrador</option> 
      </select> 
      -->

      <button type="submit" class="bg-blue-500 text-white p-2 w-full">Registrar</button> <!-- Botón para enviar el formulario -->
    </form>

    <p class="text-center">¿Ya tienes cuenta? <a (click)="goToLogin()" class="text-blue-500 cursor-pointer">Inicia sesión aquí</a></p> <!-- Enlace para ir a la página de inicio de sesión -->
  </div>
</div>
