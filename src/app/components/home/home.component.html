<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="container mx-auto max-w-md bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-center">Bienvenido a ZapasPro</h1>
    <form (ngSubmit)="register()" class="mt-4">
      <input [(ngModel)]="username" name="username" placeholder="Nombre de usuario" class="border p-2 w-full mb-2" required />
      <input [(ngModel)]="password" name="password" placeholder="Contraseña" type="password" class="border p-2 w-full mb-4" required />
      <!-- <select [(ngModel)]="role" name="role" class="border p-2 w-full mb-4">
        <option value="client">Cliente</option>
        <option value="admin">Administrador</option>
      </select> -->
      <button type="submit" class="bg-blue-500 text-white p-2 w-full">Registrar</button>
    </form>
    <p class="text-center">¿Ya tienes cuenta? <a (click)="goToLogin()" class="text-blue-500 cursor-pointer">Inicia sesión aquí</a></p>
  </div>
</div>
